    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCOb0TV-xPJgglQqByOIQqp0X6rWgxZpUQ",
            authDomain: "your-carricature-ai.firebaseapp.com",
            projectId: "your-carricature-ai",
            storageBucket: "your-carricature-ai.firebasestorage.app",
            messagingSenderId: "822360440252",
            appId: "1:822360440252:web:6ea9e96ab443dc2f463fb9",
            measurementId: "G-QHBKQ3JV2S"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (!user) {
                // 로그인 확인 대기 시간 대폭 연장 (모바일 네트워크 지연 대응)
                setTimeout(() => {
                    if (!auth.currentUser) {
                        console.log("No user session found, returning to main.");
                        window.location.href = "index.html";
                    }
                }, 5000);
            } else {
                // Check if paid in Firestore
                db.collection('users').doc(user.uid).onSnapshot((doc) => {
                    if (doc.exists && doc.data().paid) {
                        console.log("Payment confirmed.");
                    } else {
                        // 결제 데이터 확인 지연 시간 연장
                        setTimeout(() => {
                            db.collection('users').doc(user.uid).get().then(newDoc => {
                                if (!newDoc.exists || !newDoc.data().paid) {
                                    alert("결제 이력이 확인되지 않습니다.");
                                    window.location.href = "index.html";
                                }
                            });
                        }, 5000);
                    }
                });
            }
        });

        // Share & Download Logic
        const shareBtn = document.getElementById('share-btn');
        const downloadBtn = document.getElementById('download-btn');

        shareBtn.onclick = async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: '당신의 캐리커처 - 예술적 펜 라인',
                        text: '나만의 AI 캐리커처를 만들었어요! 정말 세련되고 멋지지 않나요? 지금 바로 확인해보세요.',
                        url: window.location.href
                    });
                } catch (err) {
                    console.error('Sharing failed:', err);
                }
            } else {
                alert('Share feature is not supported in this browser. You can copy the URL manually!');
            }
        };

        downloadBtn.onclick = () => {
            // In a real app, this would download the generated image file
            alert('Your high-resolution caricature is being prepared for download!');
        };
    </script>
    <script>
        const i18n = {
            ko: {
                slogan: "예술적 펜 라인",

                tag_us: "태그하기",
                create: "생성하기",
                gallery: "갤러리",
                nav_settings: "설정"
            },
            en: {
                slogan: "Artistic Pen Line",
                brand_prefix: "Your",
                brand_suffix: "Caricature",
                save_gallery: "Save to Gallery",
                share_friends: "Share with Friends!",
                share_promo: "Love your caricature? Share it on Instagram and tag us for a chance to win a free pack!",
                tag_us: "Tag Us",
                create: "Create",
                gallery: "Gallery",
                nav_settings: "Settings"
            }
        };

        function applyLanguage(lang) {
            const texts = i18n[lang] || i18n.en;
            document.querySelectorAll('[data-t]').forEach(el => {
                const key = el.getAttribute('data-t');
                if (texts[key]) el.textContent = texts[key];
            });

            const headerBrand = document.getElementById('header-brand');
            if (headerBrand) {
                if (lang === 'en') {
                    headerBrand.innerHTML = `<span class="text-white">${texts.brand_prefix}</span> <span class="text-[#6366f1]">${texts.brand_suffix}</span>`;
                } else {
                    headerBrand.innerHTML = `<span class="text-white">당신의</span> <span class="text-[#6366f1]">캐리커처</span>`;
                }
            }
        }

        const userLang = navigator.language.startsWith('ko') ? 'ko' : 'en';
        applyLanguage(userLang);
    </script>
