<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
    <div
        class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto bg-background-light dark:bg-background-dark shadow-2xl">
        <header
            class="flex items-center justify-between p-4 sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
            <a href="index.html"
                class="flex size-10 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <div class="flex items-center gap-3">
                <div class="relative w-8 h-8 flex items-center justify-center">
                    <div
                        class="absolute inset-0 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-lg rotate-6 shadow-md shadow-indigo-500/20">
                    </div>
                    <span class="material-symbols-outlined text-white text-lg relative z-10">face_6</span>
                </div>
                <h1 class="text-lg font-bold tracking-tight">Caricature AI</h1>
            </div>
            <a href="index.html"
                class="text-primary font-bold text-sm px-4 py-2 hover:bg-primary/10 rounded-full transition-colors">New</a>
        </header>

        <main class="flex-1 px-4 py-2 flex flex-col gap-6">
            <div class="relative group">
                <div
                    class="w-full aspect-[4/5] overflow-hidden rounded-xl bg-slate-200 dark:bg-slate-800 shadow-lg border border-slate-200 dark:border-slate-700">
                    <div class="w-full h-full bg-center bg-no-repeat bg-cover transition-transform duration-500 hover:scale-105"
                        style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDtVnlYAcP7IfVTHFyttSWjE0hMCHpGZU5_1rdjTQoN7GRlSLgHr1sxJG0D6mfR568dCE60FlwU2dcCNLg9wBvIOkoRKHcJzwHQx8XxSuUYnXBcmCWarNcykPsXYrDYTc4P5D46iix_nUrChVKHj4cjinEaKg4P9X8eQJBUD1_A2fpsM2F4n0_dakbpL37cwXaz1A5QxLbO3tfcwbwbkzrMrH3WmewmkWdtQIazotxEIkPBpKNa0Cib4q-lu1ULBJLkoKeng06KqKNy");'>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <div class="flex gap-3">
                    <button id="download-btn"
                        class="flex-1 flex items-center justify-center gap-2 h-14 bg-primary text-white rounded-xl font-bold shadow-lg shadow-primary/25 hover:opacity-90 transition-opacity">
                        <span class="material-symbols-outlined">download</span>
                        <span>Save to Gallery</span>
                    </button>
                    <button id="share-btn"
                        class="w-14 h-14 flex items-center justify-center bg-primary/10 text-primary rounded-xl hover:bg-primary/20 transition-colors">
                        <span class="material-symbols-outlined">share</span>
                    </button>
                </div>

                <div
                    class="mt-4 p-4 rounded-xl bg-gradient-to-r from-indigo-500/10 to-violet-500/10 border border-indigo-500/20 flex items-center gap-4">
                    <div class="bg-indigo-500/20 p-2 rounded-lg">
                        <span class="material-symbols-outlined text-indigo-600">redeem</span>
                    </div>
                    <div class="flex-1">
                        <h4 class="text-sm font-bold text-slate-900 dark:text-slate-100">Share with Friends!</h4>
                        <p class="text-[11px] text-slate-500 dark:text-slate-400 leading-tight">Love your caricature?
                            Share it on Instagram and tag us for a chance to win a free pack!</p>
                    </div>
                    <button class="bg-primary text-white text-[10px] font-bold px-3 py-1.5 rounded-lg shadow-sm">
                        Tag Us
                    </button>
                </div>
            </div>
        </main>

        <nav
            class="flex gap-2 border-t border-primary/10 bg-background-light/95 dark:bg-background-dark/95 px-4 pb-6 pt-2 sticky bottom-0">
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-indigo-600" href="index.html">
                <div class="flex h-8 items-center justify-center"><span
                        class="material-symbols-outlined text-[28px] fill-[1]">magic_button</span></div>
                <p class="text-[10px] font-bold uppercase tracking-wider">Create</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500" href="#">
                <div class="flex h-8 items-center justify-center"><span
                        class="material-symbols-outlined text-[28px]">auto_awesome_motion</span></div>
                <p class="text-[10px] font-bold uppercase tracking-wider">Gallery</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500" href="#">
                <div class="flex h-8 items-center justify-center"><span
                        class="material-symbols-outlined text-[28px]">account_circle</span></div>
                <p class="text-[10px] font-bold uppercase tracking-wider">Profile</p>
            </a>
        </nav>
    </div>

    <!-- SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGX46KzjVDJThGn9j4rMdWQBwZNRHmdF0",
            authDomain: "linkbioprofit.firebaseapp.com",
            projectId: "linkbioprofit",
            storageBucket: "linkbioprofit.firebasestorage.app",
            messagingSenderId: "980288554275",
            appId: "1:980288554275:web:465061c36cf60418187896"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = "index.html";
            } else {
                const doc = await db.collection('users').doc(user.uid).get();
                if (!doc.exists || !doc.data().paid) {
                    alert("Please complete the payment to view your caricature.");
                    window.location.href = "index.html";
                }
            }
        });

        // Share & Download Logic
        const shareBtn = document.getElementById('share-btn');
        const downloadBtn = document.getElementById('download-btn');

        shareBtn.onclick = async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'My Custom Caricature!',
                        text: 'Look at this cool caricature I made with Caricature AI!',
                        url: window.location.href
                    });
                } catch (err) {
                    console.error('Sharing failed:', err);
                }
            } else {
                alert('Share feature is not supported in this browser. You can copy the URL manually!');
            }
        };

        downloadBtn.onclick = () => {
            // In a real app, this would download the generated image file
            alert('Your high-resolution caricature is being prepared for download!');
        };
    </script>
</body>

</html>
